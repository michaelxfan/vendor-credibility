<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Credibility</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111;--surface:#181818;--surface2:#1e1e1e;--border:#262626;
  --text:#c8c8c8;--text2:#888;--text3:#555;--white:#eee;
  --accent:#7c9aff;--green:#4ade80;--yellow:#fbbf24;--red:#f87171;--orange:#fb923c;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
::selection{background:#7c9aff33}

/* Top bar */
.topbar{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;flex-shrink:0;background:var(--bg)}
.topbar h1{font-size:15px;color:var(--white);font-weight:600;letter-spacing:-.2px}
.topbar input{width:100%;max-width:240px;padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.topbar input:focus{border-color:var(--accent)}
.topbar .meta{color:var(--text3);font-size:12px;margin-left:auto}
.focus-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--text2);user-select:none;margin-left:12px}
.focus-toggle input{display:none}
.focus-toggle .pill{width:32px;height:18px;background:var(--border);border-radius:9px;position:relative;transition:background .2s}
.focus-toggle .pill::after{content:'';position:absolute;width:14px;height:14px;background:var(--text2);border-radius:50%;top:2px;left:2px;transition:transform .2s,background .2s}
.focus-toggle input:checked+.pill{background:var(--accent)}
.focus-toggle input:checked+.pill::after{transform:translateX(14px);background:var(--white)}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;background:var(--bg)}
.sidebar-item{padding:14px 18px;cursor:pointer;transition:background .12s;border-bottom:1px solid #1a1a1a}
.sidebar-item:hover{background:var(--surface)}
.sidebar-item.active{background:var(--surface);border-left:2px solid var(--accent);padding-left:16px}
.sidebar-item .si-name{font-size:14px;color:var(--white);font-weight:500}
.sidebar-item .si-row{display:flex;align-items:center;gap:8px;margin-top:5px}
.sidebar-item .si-score{font-size:20px;font-weight:700}
.sidebar-item .si-tier{font-size:11px;color:var(--text2)}
.sidebar-item .si-date{font-size:11px;color:var(--text3);margin-top:2px}
.empty-state{padding:48px 24px;text-align:center;color:var(--text3);font-size:13px}

/* Main */
.main{flex:1;overflow-y:auto;scroll-behavior:smooth}

/* Detail header — minimal */
.detail-header{padding:32px 40px 24px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
.dh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.dh-company{font-size:22px;color:var(--white);font-weight:600;letter-spacing:-.3px}
.dh-meta{color:var(--text3);font-size:13px;margin-top:4px}
.dh-meta a{color:var(--text2)}
.dh-score{text-align:right}
.dh-score .big{font-size:40px;font-weight:700;line-height:1}
.dh-score .of{font-size:13px;color:var(--text3);font-weight:400}
.dh-tier{display:inline-block;padding:3px 12px;border-radius:6px;font-size:11px;font-weight:600;margin-top:6px;letter-spacing:.2px}

/* Tier colors */
.t-premium{background:#4ade8018;color:var(--green)}.t-strong{background:#7c9aff18;color:var(--accent)}.t-capable{background:#fbbf2418;color:var(--yellow)}.t-commodity{background:#fb923c18;color:var(--orange)}.t-weak{background:#f8717118;color:var(--red)}.t-low{background:#991b1b18;color:#fca5a5}

/* Content area */
.content{padding:24px 40px 48px;max-width:860px}

/* Executive summary */
.exec{padding:24px 0;margin-bottom:8px}
.exec-headline{font-size:15px;color:var(--white);font-weight:500;margin-bottom:16px}
.exec ul{list-style:none}
.exec li{padding:7px 0;font-size:14px;color:var(--text);border-bottom:1px solid #1f1f1f}
.exec li:last-child{border-bottom:none}
.exec li strong{color:var(--white);font-weight:500}
.exec-decision{margin-top:20px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:8px}
.exec-decision .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ed-go{background:#4ade8010;color:var(--green)}.ed-go .dot{background:var(--green)}
.ed-no{background:#f8717110;color:var(--red)}.ed-no .dot{background:var(--red)}
.ed-maybe{background:#fbbf2410;color:var(--yellow)}.ed-maybe .dot{background:var(--yellow)}

/* Accordion */
.accordion{border-top:1px solid var(--border)}
.acc-header{display:flex;align-items:center;padding:16px 0;cursor:pointer;user-select:none;transition:opacity .12s}
.acc-header:hover{opacity:.85}
.acc-title{font-size:14px;color:var(--white);font-weight:500;flex-shrink:0}
.acc-preview{font-size:12px;color:var(--text3);margin-left:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acc-chevron{width:16px;height:16px;flex-shrink:0;margin-left:8px;transition:transform .2s;color:var(--text3)}
.acc-chevron svg{display:block}
.accordion.open .acc-chevron{transform:rotate(90deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .25s ease-out,opacity .2s;opacity:0}
.accordion.open .acc-body{max-height:9999px;opacity:1;transition:max-height .35s ease-in,opacity .25s}
.acc-inner{padding:0 0 24px}

/* Shared detail styles */
.dg{display:grid;grid-template-columns:150px 1fr;gap:6px 16px;font-size:13px}
.dg dt{color:var(--text3)}
.dg dd{color:var(--text)}
.dg dd a{color:var(--accent)}
.tag{display:inline-block;padding:1px 7px;background:var(--surface2);border-radius:4px;font-size:11px;color:var(--text2);margin:1px}

/* Score bar — minimal */
.sb{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sb-label{width:180px;font-size:12px;color:var(--text3);flex-shrink:0}
.sb-track{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.sb-fill{height:100%;border-radius:2px}
.sb-fill.g{background:var(--green)}.sb-fill.y{background:var(--yellow)}.sb-fill.r{background:var(--red)}
.sb-val{width:32px;text-align:right;font-size:12px;font-weight:600}
.sb-val.g{color:var(--green)}.sb-val.y{color:var(--yellow)}.sb-val.r{color:var(--red)}

/* Leader table — minimal */
.lt{width:100%;font-size:12px;border-collapse:collapse}
.lt th{text-align:left;padding:8px 8px;color:var(--text3);font-weight:400;border-bottom:1px solid var(--border)}
.lt td{padding:8px;border-bottom:1px solid #1a1a1a;color:var(--text);vertical-align:top}
.lt td a{color:var(--accent)}
.lt .name{color:var(--white);font-weight:500}

/* Rec cards — minimal */
.rec{padding:14px 0;border-bottom:1px solid #1f1f1f}
.rec:last-child{border-bottom:none}
.rec-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.rec-val{font-size:14px;color:var(--white);font-weight:500}
.rec-detail{font-size:12px;color:var(--text2);margin-top:3px}

/* Discovery questions — minimal */
.dq{padding:14px 0;border-bottom:1px solid #1f1f1f}
.dq:last-child{border-bottom:none}
.dq-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dq-cat{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.dq-prio{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.dq-prio.hi{color:var(--red)}.dq-prio.med{color:var(--yellow)}.dq-prio.lo{color:var(--green)}
.dq-q{font-size:14px;color:var(--white);font-weight:400;line-height:1.6;cursor:pointer;padding:2px 0}
.dq-q:hover{color:var(--accent)}
.dq-detail{max-height:0;overflow:hidden;opacity:0;transition:max-height .2s,opacity .15s}
.dq.expanded .dq-detail{max-height:600px;opacity:1;transition:max-height .3s,opacity .2s}
.dq-obj{font-size:12px;color:var(--text3);font-style:italic;margin:8px 0}
.dq-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.dq-cols{grid-template-columns:1fr}}
.dq-col{padding:10px 12px;border-radius:6px;font-size:12px}
.dq-col h5{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.dq-col ul{list-style:none}
.dq-col li{padding:2px 0;color:var(--text2);line-height:1.4}
.dq-col.strong{background:#4ade800a}.dq-col.strong h5{color:var(--green)}
.dq-col.weak{background:#f871710a}.dq-col.weak h5{color:var(--red)}
.show-more{font-size:12px;color:var(--accent);cursor:pointer;padding:10px 0;display:inline-block}
.show-more:hover{text-decoration:underline}

/* Guide panel */
.guide{margin-top:16px;padding:16px;background:var(--surface);border-radius:8px}
.guide h4{font-size:13px;color:var(--white);font-weight:500;margin-bottom:10px}
.guide-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.guide-cols{grid-template-columns:1fr}}
.guide-col ul{list-style:none;font-size:12px}
.guide-col li{padding:2px 0}
.guide-col.lean li{color:var(--green)}
.guide-col.walk li{color:var(--red)}
.guide-col h5{font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600;color:var(--text3)}

/* Source links */
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.src-grid{grid-template-columns:1fr}}
.src-group h4{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;font-weight:500}
.src-group ul{list-style:none;margin-bottom:12px}
.src-group li{padding:2px 0}
.src-group li a{font-size:12px;word-break:break-all}

/* Confidence */
.conf{font-size:11px;font-weight:500}
.conf-high{color:var(--green)}.conf-med{color:var(--yellow)}.conf-low{color:var(--red)}

/* Focus mode */
.focus-active .accordion:not(.focus-visible){display:none}

/* Misc */
.note{font-size:12px;color:var(--text3);margin-top:6px}
.divider{border:none;border-top:1px solid #1f1f1f;margin:12px 0}
.timestamp{text-align:center;color:var(--text3);font-size:11px;padding:32px 0}

@media(max-width:768px){.sidebar{width:200px}.content,.detail-header{padding-left:24px;padding-right:24px}}
@media print{body{background:#fff;color:#000}.accordion .acc-body{max-height:9999px;opacity:1}a{color:#0066cc}}
</style>
</head>
<body>

</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

// Helpers
const esc=(s)=>{if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML};
const sc=(v)=>v>=7?'g':v>=4?'y':'r';
const tc=(tier)=>{const t=tier.toLowerCase();return t.includes('premium')?'premium':t.includes('strong')?'strong':t.includes('capable')?'capable':t.includes('commodity')?'commodity':t.includes('weak')?'weak':'low'};
const bar=(label,val)=>{const c=sc(val);return`<div class="sb"><div class="sb-label">${esc(label)}</div><div class="sb-track"><div class="sb-fill ${c}" style="width:${val*10}%"></div></div><div class="sb-val ${c}">${val.toFixed(1)}</div></div>`};
const chevronSvg='<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M6 4l4 4-4 4"/></svg>';

// Accordion helper
function accordion(id,title,preview,content,opts={}){
  const open=opts.open?'open':'';
  const focus=opts.focus?'focus-visible':'';
  return`<div class="accordion ${open} ${focus}" data-acc="${id}">
    <div class="acc-header" onclick="toggleAcc(this)">
      <div class="acc-title">${title}</div>
      <div class="acc-preview">${esc(preview)}</div>
      <div class="acc-chevron">${chevronSvg}</div>
    </div>
    <div class="acc-body"><div class="acc-inner">${content}</div></div>
  </div>`;
}

function toggleAcc(el){
  const acc=el.closest('.accordion');
  acc.classList.toggle('open');
  saveAccState();
}

function saveAccState(){
  const state={};
  document.querySelectorAll('.accordion').forEach(a=>{state[a.dataset.acc]=a.classList.contains('open')});
  try{localStorage.setItem('vc-acc-'+selected,JSON.stringify(state))}catch(e){}
}
function restoreAccState(){
  try{
    const state=JSON.parse(localStorage.getItem('vc-acc-'+selected));
    if(!state)return;
    document.querySelectorAll('.accordion').forEach(a=>{
      if(state[a.dataset.acc]!==undefined){a.classList.toggle('open',state[a.dataset.acc])}
    });
  }catch(e){}
}

// Sidebar
let selected=ASSESSMENTS.length?ASSESSMENTS[0].id:null;
let focusMode=false;

function renderSidebar(filter=''){
  const sb=document.getElementById('sidebar');
  const list=ASSESSMENTS.filter(a=>!filter||a.company.name.toLowerCase().includes(filter.toLowerCase()));
  document.getElementById('count').textContent=ASSESSMENTS.length+' vendor'+(ASSESSMENTS.length!==1?'s':'');
  if(!list.length){sb.innerHTML='<div class="empty-state">No vendors found.</div>';return}
  sb.innerHTML=list.map(a=>{
    const c=sc(a.scores.aggregate/10);
    return`<div class="sidebar-item${a.id===selected?' active':''}" data-id="${a.id}">
      <div class="si-name">${esc(a.company.name)}</div>
      <div class="si-row">
        <span class="si-score" style="color:var(--${c==='g'?'green':c==='y'?'yellow':'red'})">${a.scores.aggregate}</span>

      <div class="guide-cols">
        <div class="guide-col lean"><h5>Lean in if...</h5><ul>${ug.lean_in_signals.map(x=>`<li>&bull; ${esc(x)}</li>`).join('')}</ul></div>
        <div class="guide-col walk"><h5>Walk away if...</h5><ul>${ug.walk_away_signals.map(x=>`<li>&bull; ${esc(x)}</li>`).join('')}</ul></div>
      </div></div>`;
    }

    c+=accordion('questions','Discovery Questions',dqPreview,s9,{focus:true});
  }

  c+=`<div class="timestamp">Generated ${a.date}</div></div>`;
  m.innerHTML=h+c;
  m.scrollTop=0;
  restoreAccState();
  applyFocusMode();
}

// Focus mode
function applyFocusMode(){
  const main=document.getElementById('main');
  if(focusMode){main.classList.add('focus-active')}
  else{main.classList.remove('focus-active')}
}

// Init
renderSidebar();
renderDetail();
document.getElementById('search').addEventListener('input',e=>renderSidebar(e.target.value));
document.getElementById('focusToggle').addEventListener('change',e=>{
  focusMode=e.target.checked;
  applyFocusMode();
});
</script>
</body>
</html>
